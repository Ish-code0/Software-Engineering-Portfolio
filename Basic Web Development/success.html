<div class="success-container">
    <h2>Payment Successful!</h2>
    <p class="card-last">Card ending in **** <span id="last4">xxxx</span></p>
    <p>Thank you, your purchase has been completed!</p>
   </div>

   <script>
    const params = new URLSearchParams(window.location.search); // Extracts the query from the current webpage
    const last4 = params.get("last4"); // gets the value of the parameter known as last 4
    if (last4) { //if statement to make sure the last 4 digits are presented on success.html and if null nothing will show
      document.getElementById("last4").textContent = last4; //ensures last 4 digits //
    } //  I have used the method URL parameters due to it being simple and easy to use, however if i wanted to make my website more secure I would use Form POST to a back-end -->
  </script>
